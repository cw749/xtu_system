spring:
  datasource:
    url: ${TEST_DB_URL:${DB_URL:jdbc:mysql://127.0.0.1:3306/xtu_system_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}}
    username: ${TEST_DB_USERNAME:${DB_USERNAME:root}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:123456}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:/db/migration/V1__init_user_module.sql
        - classpath:/db/migration/V2__business_modules.sql
        - classpath:/db/migration/V3__workflow_attachment_log.sql

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    secret: ${JWT_SECRET:XTUIntegratedInformationSystemJwtSecretKey2026SpringBoot}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
